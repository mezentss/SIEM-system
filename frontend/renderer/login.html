<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIEM - Вход и регистрация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Система мониторинга SIEM</h1>
            
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Вход</button>
                <button class="auth-tab" data-tab="register">Регистрация</button>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="login-field">
                    <label for="loginUsername">Имя пользователя</label>
                    <input type="text" id="loginUsername" name="username" required autocomplete="username">
                </div>
                <div class="login-field">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" name="password" required autocomplete="current-password">
                </div>
                <div id="loginError" class="login-error hidden"></div>
                <button type="submit" class="login-button">Войти</button>
            </form>
            
            <form id="registerForm" class="auth-form hidden">
                <div class="login-field">
                    <label for="regUsername">Имя пользователя</label>
                    <input type="text" id="regUsername" name="username" required autocomplete="username">
                </div>
                <div class="login-field">
                    <label for="regPassword">Пароль (мин. 4 символа)</label>
                    <input type="password" id="regPassword" name="password" required minlength="4" autocomplete="new-password">
                </div>
                <div class="login-field">
                    <label for="regFullName">ФИО</label>
                    <input type="text" id="regFullName" name="full_name" placeholder="Иванов Иван Иванович">
                </div>
                <div class="login-field">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" name="email" placeholder="ivan@example.com">
                </div>
                <div class="login-field">
                    <label for="regPhone">Телефон</label>
                    <input type="tel" id="regPhone" name="phone" placeholder="+7 (999) 123-45-67">
                </div>
                <div id="registerError" class="login-error hidden"></div>
                <div id="registerSuccess" class="login-success hidden"></div>
                <button type="submit" class="login-button">Зарегистрироваться</button>
            </form>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
